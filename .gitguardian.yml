# GitGuardian configuration — ignore conventional Go test paths.
#
# Test files (`*_test.go`) and test fixtures (`testdata/`) intentionally
# contain placeholder values that exercise secret-handling logic (e.g.
# the slog redaction handler in internal/log). Those placeholders are
# never real credentials. Real secrets are sourced exclusively from
# environment variables at runtime per the LGB_{SECTION}_{FIELD}
# convention (see openspec/changes/mvp-foundation/proposal.md).
#
# If a real secret ever ends up in production code (outside of test
# paths) GitGuardian will still catch it.
version: 2
paths-ignore:
  - "**/*_test.go"
  - "**/testdata/**"
