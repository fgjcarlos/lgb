# Pinned action SHAs/tags (resolved 2026-05-23 for supply-chain security):
#   golangci/golangci-lint-action@v8.0.0
#     tag object SHA : 4afd733a84b1f43292c63897423277bb7f4313a9
#   v8 + golangci-lint v2 are required: v1.x was built with Go 1.23 and cannot
#   load configs targeting Go 1.24 (this project's go.mod minimum).
#   GitHub Actions `uses:` pins the tag object SHA for annotated tags.
#   To update: re-resolve via `gh api repos/golangci/golangci-lint-action/git/refs/tags/<ver>`
#   and update both this comment and the lint step in backend-test.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use runner Go toolchain
        run: go version
      - name: Check for Go source files
        id: gocheck
        run: |
          if find . -name '*.go' -not -path './vendor/*' -not -path './node_modules/*' -print -quit | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Go source files yet — skipping vet and test."
          fi
      - name: go vet
        if: steps.gocheck.outputs.has_go == 'true'
        # -tags no_embed prevents requiring frontend/dist at CI vet time.
        # The embed guard will be removed before archive (spec MVP-FND-1.10).
        run: go vet -tags no_embed ./...
      - name: go test
        if: steps.gocheck.outputs.has_go == 'true'
        # -tags no_embed prevents requiring frontend/dist at CI test time.
        # The embed guard will be removed before archive (spec MVP-FND-1.10).
        run: go test -tags no_embed ./... -race -count=1
      - name: make generate
        if: steps.gocheck.outputs.has_go == 'true'
        # Runs protobuf codegen (if .proto files exist) or prints a notice and exits 0.
        # Requirements: MVP-FND-1.13. Design: §21.
        run: make generate
      - name: golangci-lint
        if: steps.gocheck.outputs.has_go == 'true'
        # Pinned by tag object SHA — see comment at the top of this file.
        # golangci/golangci-lint-action@v8.0.0 (v2 schema, supports Go 1.24+)
        # SHA: 4afd733a84b1f43292c63897423277bb7f4313a9
        # Requirements: MVP-FND-1.11, MVP-FND-9.9. Design: §14, decision #23.
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9
        with:
          version: v2.12.2
          args: --config=.golangci.yml

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for frontend
        id: fecheck
        # Emit has_frontend=true only when frontend/package.json exists.
        # Requirements: MVP-FND-1.12, MVP-FND-9.5. Design: §14, decision #24.
        run: |
          if [ -f frontend/package.json ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No frontend/package.json — skipping frontend build."
          fi
      - uses: actions/setup-node@v4
        if: steps.fecheck.outputs.has_frontend == 'true'
        with:
          node-version-file: 'frontend/.nvmrc'
      - name: npm ci && build
        if: steps.fecheck.outputs.has_frontend == 'true'
        working-directory: frontend
        # spec MVP-FND-9.5 mandates `npm ci && npm run build`
        run: npm ci && npm run build

  backend-build:
    name: Backend build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - name: Use runner Go toolchain
        run: go version
      - name: go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        # -tags no_embed prevents requiring frontend/dist at CI build time.
        # The embed guard will be removed before archive (spec MVP-FND-1.10).
        run: go build -tags no_embed ./...
